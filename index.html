<!doctype html>
<html lang="en-GB">
  <head>
    <!-- Set the theme attribute before first paint, from the mirror
         src/theme.ts keeps in localStorage — avoids a flash of the wrong
         palette while the real (possibly async, tauri-plugin-store-backed)
         persisted setting loads. Absent/invalid value = "system", which
         needs no attribute (see tokens.css). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("markdownReader.themeMirror");
          if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content (PLAN-ANDROID.md §3 "Editor"): on
         Android, the on-screen keyboard shrinks the layout viewport (rather
         than just overlaying content), so percentage/flex-based heights
         (see src/styles/base.css's html/body/#root height:100%) resize with
         it and keep the caret above the keyboard instead of behind it.
         Ignored by desktop browsers/WKWebView — harmless there. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>Markdown Reader</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
